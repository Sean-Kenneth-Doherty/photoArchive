{% extends "base.html" %}
{% block title %}photoArchive — Library{% endblock %}
{% block navbar %}{% endblock %}
{% block content %}
<div class="library-container">
    <div class="library-search">
        <input type="text" id="search-input" placeholder="Search photos... (e.g. sunset, portrait, building)"
               autocomplete="off" spellcheck="false">
        <button class="search-clear hidden" id="search-clear" onclick="PhotoArchive.clearSearch()">&times;</button>
    </div>

    <div class="rankings-grid" id="rankings-grid">
    </div>

    <!-- Lightbox overlay -->
    <div class="lightbox hidden" id="lightbox">
        <div class="lightbox-nav lightbox-prev" onclick="event.stopPropagation(); PhotoArchive.lightboxPrev()">&#8249;</div>
        <div class="lightbox-center" onclick="PhotoArchive.closeLightbox()">
            <img id="lightbox-img" src="" alt="">
            <div class="lightbox-meta">
                <div class="lightbox-info" id="lightbox-info"></div>
                <div class="lightbox-exif" id="lightbox-exif"></div>
            </div>
            <div class="lightbox-actions">
                <button class="lightbox-btn" onclick="event.stopPropagation(); PhotoArchive.findSimilar()">Find Similar</button>
            </div>
        </div>
        <div class="lightbox-nav lightbox-next" onclick="event.stopPropagation(); PhotoArchive.lightboxNext()">&#8250;</div>
    </div>
</div>
{% endblock %}

{% block bottom_bar %}
<footer class="bottom-bar" id="library-bar">
    <div class="bar-section bar-sorts">
        <div class="toggle-group toggle-group-sm" id="sort-toggles">
            <button id="sort-elo" class="active" onclick="PhotoArchive.setRankingsSort('elo')">Top Rated</button>
            <button id="sort-ai" onclick="PhotoArchive.setRankingsSort('ai')">AI Ranked</button>
            <button id="sort-elo_asc" onclick="PhotoArchive.setRankingsSort('elo_asc')">Lowest</button>
            <button id="sort-comparisons" onclick="PhotoArchive.setRankingsSort('comparisons')">Most Compared</button>
            <button id="sort-least_compared" onclick="PhotoArchive.setRankingsSort('least_compared')">Least Compared</button>
            <button id="sort-newest" onclick="PhotoArchive.setRankingsSort('newest')">Newest</button>
            <button id="sort-filename" onclick="PhotoArchive.setRankingsSort('filename')">Filename</button>
        </div>
    </div>
    <div class="bar-divider"></div>
    <div class="bar-section bar-filters">
        <div class="filter-group" title="Orientation">
            <button class="filter-icon" data-filter="orientation" data-value="landscape" onclick="PhotoArchive.toggleFilter('orientation','landscape',this)" title="Landscape">
                <svg width="16" height="12" viewBox="0 0 16 12"><rect x="1" y="1" width="14" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button class="filter-icon" data-filter="orientation" data-value="portrait" onclick="PhotoArchive.toggleFilter('orientation','portrait',this)" title="Portrait">
                <svg width="12" height="16" viewBox="0 0 12 16"><rect x="1" y="1" width="10" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
        </div>
        <div class="filter-sep"></div>
        <div class="filter-group" title="Comparison status">
            <button class="filter-icon" data-filter="compared" data-value="compared" onclick="PhotoArchive.toggleFilter('compared','compared',this)" title="Compared">
                <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 7l3 3 7-7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="filter-icon" data-filter="compared" data-value="uncompared" onclick="PhotoArchive.toggleFilter('compared','uncompared',this)" title="Uncompared">
                <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M6 5.5a1.5 1.5 0 0 1 2.5 1c0 1-1.5 1-1.5 2" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="7" cy="10.5" r="0.5" fill="currentColor"/></svg>
            </button>
            <button class="filter-icon" data-filter="compared" data-value="confident" onclick="PhotoArchive.toggleFilter('compared','confident',this)" title="Confident (10+ comparisons)">
                <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 7l3 3 7-7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 4l3 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
        <div class="filter-sep"></div>
        <div class="filter-group filter-stars" title="Minimum star rating">
            <button class="filter-star" data-star="1" onclick="PhotoArchive.toggleStar(1)">★</button>
            <button class="filter-star" data-star="2" onclick="PhotoArchive.toggleStar(2)">★</button>
            <button class="filter-star" data-star="3" onclick="PhotoArchive.toggleStar(3)">★</button>
            <button class="filter-star" data-star="4" onclick="PhotoArchive.toggleStar(4)">★</button>
            <button class="filter-star" data-star="5" onclick="PhotoArchive.toggleStar(5)">★</button>
        </div>
        <div class="filter-sep"></div>
        <select id="filter-folder" class="bar-select" onchange="PhotoArchive.setFilter('folder', this.value)">
            <option value="">All Folders</option>
        </select>
    </div>
    <div class="bar-divider"></div>
    <div class="bar-section bar-size">
        <input type="range" id="thumb-size" class="bar-slider" min="120" max="400" value="220"
               oninput="PhotoArchive.setThumbSize(this.value)" title="Thumbnail size">
    </div>
    <div class="bar-divider"></div>
    <div class="bar-section bar-stats">
        <span id="compare-stat-comparisons" class="bar-stat-num">0</span> comparisons
        <span class="bar-dot">&middot;</span>
        <span id="compare-stat-pool" class="bar-stat-num">0</span> images
    </div>
    <div class="bar-divider"></div>
    <div class="bar-section bar-ai" id="bar-ai">
        <span class="bar-ai-label">AI</span>
        <span id="ai-embed-count">—</span>/<span id="ai-embed-total">—</span>
        <span id="ai-model-state" class="bar-ai-state"></span>
    </div>
    <div class="bar-divider"></div>
    <div class="bar-section bar-export">
        <button class="bar-btn" onclick="PhotoArchive.toggleBatchMode()">Select</button>
        <button class="bar-btn" onclick="PhotoArchive.exportRankings('json')">JSON</button>
        <button class="bar-btn" onclick="PhotoArchive.exportRankings('csv')">CSV</button>
    </div>
    <div class="bar-section bar-nav">
        <a href="/compare" class="bar-link">Compare</a>
    </div>
</footer>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => PhotoArchive.initLibrary());
</script>
{% endblock %}
