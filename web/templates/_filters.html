<div class="bar-section bar-filters">
    <div class="filter-group" title="Orientation">
        <button type="button" class="filter-icon" onclick="PhotoArchive.toggleFilter('orientation','landscape',this)" title="Landscape">
            <svg width="18" height="13" viewBox="0 0 18 13"><rect x=".5" y=".5" width="17" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1"/></svg>
        </button>
        <button type="button" class="filter-icon" onclick="PhotoArchive.toggleFilter('orientation','portrait',this)" title="Portrait">
            <svg width="11" height="15" viewBox="0 0 11 15"><rect x=".5" y=".5" width="10" height="14" rx="1.5" fill="none" stroke="currentColor" stroke-width="1"/></svg>
        </button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group" title="Ranked status">
        <button type="button" class="filter-icon" onclick="PhotoArchive.toggleFilter('compared','compared',this)" title="Ranked">
            <svg width="13" height="13" viewBox="0 0 13 13"><path d="M2.5 6.5l2.5 3 5.5-6" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button type="button" class="filter-icon" onclick="PhotoArchive.toggleFilter('compared','uncompared',this)" title="Unranked">
            <svg width="13" height="13" viewBox="0 0 13 13"><line x1="3" y1="3" x2="10" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="10" y1="3" x2="3" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
        <button type="button" class="filter-icon" onclick="PhotoArchive.toggleFilter('compared','confident',this)" title="High confidence (10+)">
            <svg width="13" height="13" viewBox="0 0 13 13"><path d="M2 7l2.5 3 6-6.5" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 4.5l2.5 3" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group" title="Flag">
        <button type="button" class="filter-icon filter-flag" data-flag="picked" onclick="PhotoArchive.toggleFilter('flag','picked',this)" title="Picked">P</button>
        <button type="button" class="filter-icon filter-flag" data-flag="unflagged" onclick="PhotoArchive.toggleFilter('flag','unflagged',this)" title="Unflagged">U</button>
        <button type="button" class="filter-icon filter-flag" data-flag="rejected" onclick="PhotoArchive.toggleFilter('flag','rejected',this)" title="Rejected">X</button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group filter-stars" title="Minimum rating">
        <button type="button" class="filter-star" data-star="1" onclick="PhotoArchive.toggleStar(1)">&#9734;</button>
        <button type="button" class="filter-star" data-star="2" onclick="PhotoArchive.toggleStar(2)">&#9734;</button>
        <button type="button" class="filter-star" data-star="3" onclick="PhotoArchive.toggleStar(3)">&#9734;</button>
        <button type="button" class="filter-star" data-star="4" onclick="PhotoArchive.toggleStar(4)">&#9734;</button>
        <button type="button" class="filter-star" data-star="5" onclick="PhotoArchive.toggleStar(5)">&#9734;</button>
    </div>
    <div class="filter-sep"></div>
    <select id="filter-folder" class="bar-select" onchange="PhotoArchive.setFilter('folder', this.value)">
        <option value="">All Folders</option>
    </select>
    <div class="metadata-filter-wrap">
        <button type="button" id="metadata-filter-btn" class="bar-btn metadata-filter-btn"
                onclick="PhotoArchive.toggleMetadataFilters()" aria-expanded="false">
            Metadata
        </button>
        <div id="metadata-filter-panel" class="metadata-filter-panel hidden">
            <label>
                <span>Date</span>
                <select id="filter-taken" class="bar-select" onchange="PhotoArchive.setFilter('taken', this.value)">
                    <option value="">All Dates</option>
                </select>
            </label>
            <label>
                <span>Type</span>
                <select id="filter-type" class="bar-select" onchange="PhotoArchive.setFilter('fileType', this.value)">
                    <option value="">All Types</option>
                </select>
            </label>
            <label>
                <span>Camera</span>
                <select id="filter-camera" class="bar-select metadata-select" onchange="PhotoArchive.setFilter('camera', this.value)">
                    <option value="">All Cameras</option>
                </select>
            </label>
            <label>
                <span>Lens</span>
                <select id="filter-lens" class="bar-select metadata-select metadata-select-wide" onchange="PhotoArchive.setFilter('lens', this.value)">
                    <option value="">All Lenses</option>
                </select>
            </label>
        </div>
    </div>
</div>
<div class="bar-divider"></div>
<div class="bar-section bar-size">
    <input type="range" id="thumb-size" class="bar-slider" min="120" max="400" value="220"
           oninput="PhotoArchive.setThumbSize(this.value)" title="Thumbnail size">
</div>
