<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}photoArchive{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="{% block body_class %}{% endblock %}">
    {% set current_nav %}{% block active_nav %}{% endblock %}{% endset %}
    {% block navbar %}
    <nav class="navbar">
        <a href="/" class="nav-brand">photoArchive</a>
        {% block navbar_center %}{% endblock %}
        <div class="nav-links">
            <a href="/compare" class="nav-link{% if current_nav|trim == 'compare' %} active{% endif %}">Compare</a>
            <a href="/library" class="nav-link{% if current_nav|trim == 'library' %} active{% endif %}">Library</a>
            <a href="/catalog" class="nav-link{% if current_nav|trim == 'catalog' %} active{% endif %}">Catalog</a>
        </div>
    </nav>
    {% endblock %}
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block bottom_bar %}{% endblock %}
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
