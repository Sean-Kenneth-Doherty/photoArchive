{% extends "base.html" %}
{% block title %}PhotoRanker — Rankings{% endblock %}
{% block navbar %}{% endblock %}
{% block content %}
<div class="rankings-container">
    <div class="rankings-grid" id="rankings-grid">
    </div>

    <div class="rankings-load-more hidden" id="load-more-wrap">
        <button id="load-more-btn" onclick="PhotoRanker.loadMoreRankings()">Load More</button>
    </div>

    <!-- Lightbox overlay -->
    <div class="lightbox hidden" id="lightbox" onclick="PhotoRanker.closeLightbox()">
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-info" id="lightbox-info"></div>
    </div>
</div>
{% endblock %}

{% block bottom_bar %}
<footer class="bottom-bar" id="rankings-bar">
    <div class="bar-section bar-sorts">
        <div class="toggle-group toggle-group-sm">
            <button id="sort-elo" class="active" onclick="PhotoRanker.setRankingsSort('elo')">Top Rated</button>
            <button id="sort-ai" onclick="PhotoRanker.setRankingsSort('ai')">AI Ranked</button>
            <button id="sort-elo_asc" onclick="PhotoRanker.setRankingsSort('elo_asc')">Lowest</button>
            <button id="sort-comparisons" onclick="PhotoRanker.setRankingsSort('comparisons')">Most Compared</button>
            <button id="sort-least_compared" onclick="PhotoRanker.setRankingsSort('least_compared')">Least Compared</button>
            <button id="sort-newest" onclick="PhotoRanker.setRankingsSort('newest')">Newest</button>
            <button id="sort-filename" onclick="PhotoRanker.setRankingsSort('filename')">Filename</button>
        </div>
    </div>
    <div class="bar-divider"></div>
    <div class="bar-section bar-export">
        <button class="bar-btn" onclick="PhotoRanker.exportRankings('json')">JSON</button>
        <button class="bar-btn" onclick="PhotoRanker.exportRankings('csv')">CSV</button>
    </div>
    <div class="bar-section bar-nav">
        <a href="/compare" class="bar-link">Compare</a>
    </div>
</footer>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => PhotoRanker.initRankings());
</script>
{% endblock %}
